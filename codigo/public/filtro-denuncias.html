<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Filtro de Denúncias</title>
    <link rel="stylesheet" href="filtro-denuncias.css">
</head>
<body>

    <header class="header">
        <h1>Mapa de Denúncias</h1>
    </header>

    <main class="container">
        
        <!-- Área de Filtro -->
        <section class="filtro">
            <h2>Filtrar Denúncias</h2>

            <form>
                
                <!-- Tipo de denúncia -->
                <label for="tipo">Tipo de denúncia</label>
                <select id="tipo">
                    <option value="">Selecione</option>
                    <option value="furto">Furto</option>
                    <option value="roubo">Roubo</option>
                    <option value="vandalismo">Vandalismo</option>
                </select>

                <!-- Local -->
                <label for="local">Origem</label>
                <select id="local">
                    <option value="">Selecione</option>
                    <option value="bh">Belo Horizonte</option>
                    <option value="contagem">Contagem</option>
                    <option value="betim">Betim</option>
                </select>

                <!-- Relevância -->
                <label for="relevancia">Relevância</label>
                <select id="relevancia">
                    <option value="">Selecione</option>
                    <option value="informativa">Informativa</option>
                    <option value="urgente">Urgente</option>
                </select>

                <!-- Data -->
                <label for="data">Data da ocorrência</label>
                <input type="date" id="data">

                <!-- Botão -->
                <button type="submit">Aplicar Filtro</button>

            </form>
        </section>

        <!-- Área de Resultados (placeholder) -->
        <section class="resultados">
            <h2>Denúncias</h2>
            <p>Resultados aparecerão aqui...</p>
        </section>

    </main>

</body>
</html>
