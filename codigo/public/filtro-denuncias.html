<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigilare &ndash; Filtro de Den&uacute;ncias</title>
  <link rel="stylesheet" href="filtro-denuncias.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="24" cy="24" r="22" stroke="#2c6e7f" stroke-width="2"/>
          <ellipse cx="24" cy="24" rx="10" ry="22" stroke="#2c6e7f" stroke-width="1.5"/>
          <line x1="2" y1="24" x2="46" y2="24" stroke="#2c6e7f" stroke-width="1.5"/>
          <path d="M12 10 Q24 18 36 10" stroke="#2c6e7f" stroke-width="1.2" fill="none"/>
          <path d="M12 38 Q24 30 36 38" stroke="#2c6e7f" stroke-width="1.2" fill="none"/>
        </svg>
      </div>
      <span class="navbar__name">VIGILARE</span>
    </div>

    <nav class="navbar__links">
      <a href="#" class="navbar__link">Home</a>
      <a href="#" class="navbar__link navbar__link--active">Den&uacute;ncias</a>
    </nav>

    <div class="navbar__user">
      <span class="navbar__divider" aria-hidden="true"></span>
      <span class="navbar__username">Usu&aacute;rio Teste</span>
    </div>
  </header>

  <!-- SEARCH BAR -->
  <section class="searchbar" aria-label="Barra de busca">
    <div class="searchbar__inner">

      <!-- FIX: ul movido para fora do button, dentro de um wrapper relativo -->
      <div class="searchbar__location-wrap">
        <button
          class="searchbar__location"
          id="locationBtn"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="locationDropdown"
        >
          <span id="locationLabel">Belo Horizonte, MG</span>
          <svg class="searchbar__caret" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l5 5 5-5" stroke="#2c6e7f" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>

        <ul class="dropdown" id="locationDropdown" role="listbox" aria-label="Selecione a localidade">
          <li role="option" data-value="Belo Horizonte, MG">Belo Horizonte, MG</li>
          <li role="option" data-value="S&atilde;o Paulo, SP">S&atilde;o Paulo, SP</li>
          <li role="option" data-value="Rio de Janeiro, RJ">Rio de Janeiro, RJ</li>
          <li role="option" data-value="Curitiba, PR">Curitiba, PR</li>
          <li role="option" data-value="Salvador, BA">Salvador, BA</li>
        </ul>
      </div>

      <!-- Search input -->
      <div class="searchbar__input-wrap">
        <svg class="searchbar__search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="9" cy="9" r="6.5" stroke="#2c6e7f" stroke-width="1.8"/>
          <line x1="14" y1="14" x2="19" y2="19" stroke="#2c6e7f" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="searchbar__input"
          placeholder="Pesquise den&uacute;ncias..."
          aria-label="Pesquisar den&uacute;ncias"
        />
      </div>

      <!-- Filter toggle -->
      <button
        class="searchbar__btn searchbar__btn--outline"
        id="filterToggleBtn"
        aria-expanded="false"
        aria-controls="filterPanel"
      >
        Filtrar
      </button>

      <!-- Search button -->
      <button class="searchbar__btn searchbar__btn--solid" id="searchBtn">
        Pesquisar
      </button>

      <!-- Actions -->
      <div class="searchbar__actions">
        <button class="searchbar__icon-btn" title="Nova den&uacute;ncia" aria-label="Adicionar den&uacute;ncia">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="11" fill="#2c6e7f"/>
            <line x1="12" y1="7" x2="12" y2="17" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="7" y1="12" x2="17" y2="12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="searchbar__icon-btn" title="Notifica&ccedil;&otilde;es" aria-label="Notifica&ccedil;&otilde;es" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="11" fill="#2c6e7f"/>
            <path d="M12 6a4 4 0 0 1 4 4v3l1.5 2H6.5L8 13V10a4 4 0 0 1 4-4z" fill="#fff"/>
            <circle cx="12" cy="18" r="1.3" fill="#fff"/>
          </svg>
          <span class="notif-badge" id="notifBadge">3</span>
        </button>
      </div>

    </div>
  </section>

  <!-- FILTER PANEL -->
  <main class="main" id="filterPanel" aria-label="Filtro de den&uacute;ncias">
    <div class="filter-card">
      <h1 class="filter-card__title">Filtro de den&uacute;ncias</h1>
      <p class="filter-card__subtitle">Filtre as den&uacute;ncias nos campos abaixo</p>

      <form class="filter-form" id="filterForm" novalidate>

        <div class="filter-field">
          <label class="filter-field__label" for="tipoDenuncia">Tipo de den&uacute;ncia</label>
          <input
            type="text"
            id="tipoDenuncia"
            name="tipo"
            class="filter-field__input"
            placeholder="Furto, roubo, etc..."
          />
        </div>

        <div class="filter-field">
          <label class="filter-field__label" for="origem">Origem</label>
          <input
            type="text"
            id="origem"
            name="origem"
            class="filter-field__input"
            placeholder="Belo Horizonte, S&atilde;o Paulo, Rio de Janeiro, etc..."
          />
        </div>

        <div class="filter-field">
          <label class="filter-field__label" for="relevancia">Relev&acirc;ncia da den&uacute;ncia</label>
          <input
            type="text"
            id="relevancia"
            name="relevancia"
            class="filter-field__input"
            placeholder="Urgente, Moderado, Leve, Informativo, etc..."
          />
        </div>

        <!-- FIX: fieldset + legend para grupo de datas (sem for apontando para nenhum controle) -->
        <fieldset class="filter-field filter-field--fieldset">
          <legend class="filter-field__label">Data da ocorr&ecirc;ncia</legend>
          <div class="filter-field__date-wrap">
            <input
              type="date"
              id="dataInicio"
              name="dataInicio"
              class="filter-field__input filter-field__input--date"
              aria-label="Data de in&iacute;cio"
            />
            <span class="filter-field__date-sep" aria-hidden="true">&ndash;</span>
            <input
              type="date"
              id="dataFim"
              name="dataFim"
              class="filter-field__input filter-field__input--date"
              aria-label="Data de fim"
            />
          </div>
          <div class="filter-field__date-placeholder" id="datePlaceholder" aria-hidden="true">05/03/2026 - 06/03/2026</div>
        </fieldset>

        <div class="filter-field">
          <label class="filter-field__label" for="testemunhas">Quantidade de testemunhas</label>
          <input
            type="text"
            id="testemunhas"
            name="testemunhas"
            class="filter-field__input"
            placeholder="3, 4, etc..."
          />
        </div>

        <div class="filter-form__actions">
          <button type="reset" class="filter-form__btn filter-form__btn--reset" id="resetBtn">Limpar filtros</button>
          <button type="submit" class="filter-form__btn filter-form__btn--apply">Aplicar filtros</button>
        </div>

      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer" aria-label="Rodap&eacute;"></footer>

  <script src="filtro-denuncias.js"></script>
</body>
</html>
