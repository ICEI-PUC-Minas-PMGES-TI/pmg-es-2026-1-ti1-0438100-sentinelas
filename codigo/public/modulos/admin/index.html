<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="../../assets/css/styles.css">

<body>
    <header class="standard-header">
        <a href="../home/home.html"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="standard-header-nav">

            </ul>

    <div class="admin-titulo">
        <h1>Painel Administrativo</h1>
        <p>Revise e gerencie as denúncias cadastradas no sistema.</p>

    <div class="admin-filtros">
        <label for="filtro-status">Filtrar:</label>

    <main class="admin-lista" id="lista-denuncias">
        <div class="admin-vazio">
            <h3>Carregando...</h3>
        </div>
    </main>

    <footer class="standard-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
