<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/filters.css">
    <link rel="stylesheet" href="../../assets/css/filtro-denuncias.css">
    <link rel="stylesheet" href="../../assets/css/exibicao-imoveis.css">
</head>

<body>
    <header class="header w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>
        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="botao-header" id="admin-link" style="display: none;"><a href="../admin/index.html">Admin</a>
                </li>
                <li class="botao-header" id="corretor-link" style="display: none;"><a
                        href="../imoveis/cadastro-de-imoveis.html">Cadastro de imóveis</a>
                </li>
                <li id="barra"></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="standard-sub-nav">
        <nav class="standard-sub-nav-left">

            <div class="standard-search-container">

                <input class="standard-search-input barra-pesquisa pesquisa-denuncias" type="text"
                    placeholder="Pesquise imóveis...">
            </div>
            <button class="standard-search-button pesquisar-resultado botao-denuncias"> Pesquisar Resultados </button>
        </nav>
        <nav class="standard-sub-nav-right">
            <button class="standard-nav-action" id="filterToggleBtn" title="Filtros">
                <i class="bi bi-filter"></i>
            </button>
            <a class="standard-nav-action" href="../denuncias/cadastro-denuncias.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="standard-nav-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <!-- ============================================================
        CONTEÚDO PRINCIPAL
    ============================================================ -->
    <main class="main">
        <!-- FILTROS (painel lateral) -->
        <aside class="filters" id="filterPanel">
            <div class="filtersHeader">
                <h2 class="filtersTitle">Filtros</h2>
            </div>

            <form class="filterForm" id="filterForm">
                <div class="filterField">
                    <label class="filterFieldLabel" for="filterType">Tipo de Imóvel</label>
                    <div class="filterFieldSelectWrap">
                        <select class="filterFieldInput filterFieldSelect" id="filterType">
                            <option value="">Todos</option>
                            <option value="aluguel">Aluguel</option>
                            <option value="venda">Venda</option>
                        </select>
                    </div>
                </div>

                <div class="filterField">
                    <label class="filterFieldLabel" for="filterPrice">Preço Máximo</label>
                    <input type="number" class="filterFieldInput" id="filterPrice" placeholder="Ex: 2000" />
                </div>

                <div class="filterField">
                    <label class="filterFieldLabel" for="filterRooms">Mínimo de Quartos</label>
                    <input type="number" class="filterFieldInput" id="filterRooms" min="0" placeholder="Ex: 2" />
                </div>

                <div class="filterFormActions">
                    <button type="reset" class="filterFormBtn filterFormBtnReset">Limpar</button>
                    <button type="submit" class="filterFormBtn filterFormBtnApply">Aplicar</button>
                </div>
            </form>
        </aside>

        <section class="results">
            <div class="results__header">
                <div>
                    <h1 class="results__title">Resultados</h1>
                    <span class="results__count" id="resultsCount">12 denúncias encontradas</span>
                </div>
            </div>

            <div class="results__list" id="imoveis-regiao">

        </section>
    </main>

    <footer class="standard-footer">
    </footer>

    <script src="../../assets/js/exibicao-imoveis.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
    <script src="../../assets/js/script.js"></script>
</body>

</html>
