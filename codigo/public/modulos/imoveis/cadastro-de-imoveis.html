    <div class="navegacao d-flex align-items-center justify-content-end flex-wrap">

    <main>
        <section class="cadastro-imovel">
            <h1>Realizar cadastro de imóvel</h1>
            <h4>Digite as informações</h4>
            <form class="formulario-cadastro" id="form-cadastro">
                <div class="campo-formulario">
                    <label for="nome">Nome do imóvel</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Casa Santa Tereza" required>
                </div>
                <div class="campo-formulario">
                    <label for="local">Local do imóvel</label>
                    <div class="local">
                        <input type="text" id="local" name="local"
                            placeholder="Rua exemplo, 123 - Cidade Bonita, Estado Legal" required>
                        <button type="button" class="botao-localizacao" onclick="getLocalizacao()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-geo-alt-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="campo-formulario">
                    <label for="preco">Preço do imóvel (R$)</label>
                    <input type="number" id="preco" name="preco" placeholder="Ex: 450000 " min="0" required>
                </div>
                <div class="campo-formulario">
                    <label for="quartos">Quartos</label>
                    <input type="number" id="quartos" name="quartos" placeholder="Ex: 2" min="0" required>
                </div>
                <div class="campo-formulario">
                    <label for="banheiros">Banheiros</label>
                    <input type="number" id="banheiros" name="banheiros" placeholder="Ex: 1" min="0" required>
                </div>
                <div class="campo-formulario">
                    <label for="tipo">Classificação do imóvel</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Selecione um tipo</option>
                        <option value="venda">Venda</option>
                        <option value="aluguel">Aluguel</option>
                        <option value="vendido">Vendido</option>
                        <option value="alugado">Alugado</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label for="tamanho">Tamanho do imóvel</label>
                    <input type="text" id="tamanho-imovel" name="tamanho" required placeholder="115m²"></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="descricao">Detalhes sobre o imóvel</label>
                    <textarea id="descricao" name="descricao" rows="2" required placeholder="Uma casa numa boa localização, com boa iluminação ..."></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="foto">Foto do imóvel</label>
                    <input type="file" id="foto" name="foto" accept="image/*" multiple>
                </div>
                <div class="botoes">
                    <button type="button" class="botao-cancelar">Descartar
                        Cadastro</button>
                    <button type="submit" class="botao-submit">Enviar Cadastro</button>
                </div>
            </form>
        </section>
    </main>
    <script src="../../assets/js/cadastro-de-imoveis.js"></script>
</body>

</html>
