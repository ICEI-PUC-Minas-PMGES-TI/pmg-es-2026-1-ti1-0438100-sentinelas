<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar nova denúncia</title>
    <link rel="stylesheet" href="../../assets/css/editar-imovel.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="header position-fixed w-100 d-flex justify-content-between align-items-center">
                <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="#">Home</a></li>
                <li class="botao-header"><a href="denuncias.html">Denúncias</a></li>
                <li id="barra"></li>
                <li class="botao-header"><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="navegacao d-flex align-items-center justify-content-end flex-wrap">
        <nav class="d-flex align-items-center gap-2">
            <a class="adicionar-imovel align-items-center" href="imoveis.html"><svg xmlns="http://www.w3.org/2000/svg" width="16"
                    height="16" fill="currentColor" class="bi bi-plus-circle-fill" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="notificacoes"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                    fill="currentColor" class="bi bi-bell-fill" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <main>
        <section class="editar-imovel">
            <h1>Editar dados do imóvel</h1>
            <h4>Digite as informações</h4>
            <form class="formulario-cadastro" id="form-cadastro" onsubmit="submitImovel(event)">
                <div class="campo-formulario">
                    <label for="local">Local do imóvel</label>
                    <div class="local">
                        <input type="text" id="local" name="local"
                            placeholder="Rua exemplo, 123 - Cidade Bonita, Estado Legal" required>
                        <button type="button" class="botao-localizacao" onclick="getLocalizacao()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-geo-alt-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />
                            </svg>
                        </button>
                    </div>

                </div>
                <div class="campo-formulario">
                    <label for="tipo">Classificação do imóvel</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Selecione um tipo</option>
                        <option value="venda">Venda</option>
                        <option value="aluguel">Aluguel</option>
                        <option value="vendido">Vendido</option>
                        <option value="alugado">Alugado</option>
                    </select>
                <div class="campo-formulario">
                    <label for="tamanho">Tamanho do imóvel</label>
                    <input type="text" id="tamanho-imovel" name="tamanho" required
                        placeholder="115m²"></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="descricao">Detalhes sobre o imóvel</label>
                    <textarea id="descricao" name="descricao" rows="2" required
                        placeholder="Uma casa numa boa localização, com boa iluminação ..."></textarea>
                </div>
                <div class="botoes">
                    <button type="button" class="botao-cancelar" onclick="window.history.back()">Descartar
                        Cadastro</button>
                    <button type="submit" class="botao-submit">Enviar Cadastro</button>
                </div>
            </form>
        </section>
    </main>
    <script src="../../assets/js/editar-imovel.js"></script>
</body>

</html>
