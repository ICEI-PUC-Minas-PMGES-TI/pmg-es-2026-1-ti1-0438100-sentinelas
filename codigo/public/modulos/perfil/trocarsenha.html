<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Trocar senha</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/trocarsenha.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>
        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="botao-header" id="admin-link" style="display: none;"><a href="../admin/index.html">Admin</a>
                </li>
                <li class="botao-header" id="corretor-link" style="display: none;"><a
                        href="../imoveis/cadastro-de-imoveis.html">Cadastro de imóveis</a>
                </li>
                <li id="barra"></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- CONTEÚDO -->
    <main class="pagina" id="pagina">
        <div class="form-area">
            <h1>Trocar a senha</h1>
            <p>Confirme sua senha abaixo. Se estiver correto, enviaremos um email para recriar sua senha.</p>
            <div class="campos">
                <label for="senha_antiga">Digite a senha antiga:</label>
                <input id="senha_antiga" class="senhas" type="password" placeholder="••••••••">
            </div>
            <div class="campos">
                <label for="senha_nova">Digite a nova senha:</label>
                <input id="senha_nova" class="senhas" type="password" placeholder="••••••••">
            </div>
            <div class="campos">
                <label for="senha_confirmacao">Confirme a nova senha:</label>
                <input id="senha_confirmacao" class="senhas" type="password" placeholder="••••••••">
            </div>
            <div class="botoes">
                <button class="cancelar" onclick="history.back()">Voltar</button>
                <button class="enviar" onclick="trocarSenha()">Confirmar</button>
            </div>
        </div>
    </main>
    <footer class="standard-footer"></footer>
    <script src="../../assets/js/trocarsenha.js"></script>
    <script src="../../assets/js/script.js"></script>
</body>

</html>
