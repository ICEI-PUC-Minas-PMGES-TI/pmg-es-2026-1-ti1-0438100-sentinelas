<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil – Vigilare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/meuperfil.css">
</head>

<body>
    <header class="header w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>
        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="botao-header" id="admin-link" style="display: none;"><a href="../admin/index.html">Admin</a>
                </li>
                <li class="botao-header" id="corretor-link" style="display: none;"><a
                        href="../imoveis/cadastro-de-imoveis.html">Cadastro de imóveis</a>
                </li>
                <li id="barra"></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-perfil">
        <div class="row gx-5 gy-4 align-items-start">
            <div class="col-lg-6">
                <h1 class="titulo-perfil">Meu Perfil</h1>
                <p class="subtitulo-perfil">Digite as informações</p>
                <div class="formulario">
                    <div class="campo-grupo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" class="campo-input" value="Usuário Teste">
                    </div>
                    <div class="campo-grupo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" class="campo-input" value="usuario@teste.com">
                        <a href="../perfil/trocarsenha.html" class="link-teal">Esqueceu sua senha?</a>
                    </div>
                    <div class="campo-grupo">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" class="campo-input" value="999.999.999-99">
                    </div>
                    <div class="botoes-acao d-flex gap-3 mt-3">
                        <button class="btn btn-descartar" onclick="window.history.back()">Descartar Alterações</button>
                        <button class="btn btn-salvar">Salvar Alterações</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 d-flex justify-content-center align-items-center avatar-col">
                <div class="avatar-wrapper">
                    <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="100" fill="#2d6e7e" />
                        <circle cx="100" cy="78" r="35" fill="#e8f4f7" />
                        <path d="M30 180 Q30 128 100 128 Q170 128 170 180" fill="#e8f4f7" />
                    </svg>
                    <button class="avatar-add" title="Alterar foto">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="standard-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
    <script src="../../assets/js/meuperfil.js"></script>
    <script src="../../assets/js/script.js"></script>
</body>

</html>
