<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil – Vigilare</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="meuperfil.css">
</head>

<body>

    <header class="header position-fixed w-100 d-flex justify-content-between align-items-center">
                <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="#">Home</a></li>
                <li class="botao-header"><a href="denuncias.html">Denúncias</a></li>
                <li id="barra"></li>
                <li class="botao-header"><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="navegacao d-flex align-items-center justify-content-between flex-wrap">
        <nav class="d-flex align-items-center justify-content-center gap-2">
            <select name="Cidade" id="escolherCidade" class="selecao-localidade form-select"></select>
            <div class="pesquisa d-flex align-items-center">
                <svg class="lupa" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                </svg>
                <input class="barra-pesquisa" type="text" placeholder="Pesquise Denúncias...">
            </div>
            <a class="filtrar-resultado" href="../denuncias/filtro-denuncias.html"> Filtrar Resultados </a>
            <button class="pesquisar-resultado"> Pesquisar Resultados </button>
        </nav>
        <nav class="d-flex align-items-center gap-2">
            <a class="adicionar-denuncia align-items-center" href="../denuncias/cadastro-denuncias.html"><svg xmlns="http://www.w3.org/2000/svg" width="16"
                    height="16" fill="currentColor" class="bi bi-plus-circle-fill" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="notificacoes"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                    fill="currentColor" class="bi bi-bell-fill" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <main class="container-perfil">
        <div class="row gx-5 gy-4 align-items-start">
            <div class="col-lg-6">
                <h1 class="titulo-perfil">Meu Perfil</h1>
                <p class="subtitulo-perfil">Digite as informações</p>
                <div class="formulario">
                    <div class="campo-grupo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" class="campo-input" value="Usuário Teste">
                    </div>
                    <div class="campo-grupo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" class="campo-input" value="usuario@teste.com">
                        <a href="#" class="link-teal">Esqueceu sua senha?</a>
                    </div>
                    <div class="campo-grupo">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" class="campo-input" value="(99) 99999-9999">
                    </div>
                    <div class="campo-grupo">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" class="campo-input" value="999.999.999-99">
                    </div>
                    <a href="#" class="link-excluir">Excluir minha conta</a>
                    <div class="botoes-acao d-flex gap-3 mt-3">
                        <button class="btn btn-descartar">Descartar Alterações</button>
                        <button class="btn btn-salvar">Salvar Alterações</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 d-flex justify-content-center align-items-center avatar-col">
                <div class="avatar-wrapper">
                    <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="100" fill="#2d6e7e"/>
                        <circle cx="100" cy="78" r="35" fill="#e8f4f7"/>
                        <path d="M30 180 Q30 128 100 128 Q170 128 170 180" fill="#e8f4f7"/>
                    </svg>
                    <button class="avatar-add" title="Alterar foto">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-teal"></footer>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmw0mLs2AWgT3xbMEFk3lR3BQKR"
        crossorigin="anonymous">
    </script>
    <script src="../../assets/js/search-redirect.js"></script>
</body>

</html>
