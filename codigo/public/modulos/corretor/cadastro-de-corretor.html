<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Corretor</title>
    <link rel="stylesheet" href="../../assets/css/cadastro-de-imoveis.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="header position-fixed w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="#">Home</a></li>
                <li class="botao-header"><a href="denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li id="barra"></li>
                <li class="botao-header"><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <main style="margin-top: 20vh;">
        <section class="cadastro-imovel">
            <h1>Realizar cadastro de corretor</h1>
            <h4>Digite as informações</h4>
            <form class="formulario-cadastro" id="form-cadastro" onsubmit="cadastrarCorretor(event)">
                <div class="campo-formulario">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome completo do corretor" required>
                </div>
                <div class="campo-formulario">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email do corretor" required>
                </div>
                <div class="campo-formulario">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Telefone do corretor" required>
                </div>
                <div class="campo-formulario">
                    <label for="descricao">Detalhes</label>
                    <textarea id="descricao" name="descricao" rows="2" required
                        placeholder="Experiência em vendas de imóveis, conhecimento do mercado..."></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Senha do corretor" required>
                </div>
                <div class="campo-formulario">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha"
                        placeholder="Confirme a senha do corretor" required>
                </div>
                <div class="botoes">
                    <button type="button" class="botao-cancelar" onclick="window.history.back()">Descartar
                        Cadastro</button>
                    <button type="submit" class="botao-submit">Enviar Cadastro</button>
                </div>
            </form>
        </section>
    </main>
    <script src="../../assets/js/cadastro-de-corretor.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
</body>

</html>
