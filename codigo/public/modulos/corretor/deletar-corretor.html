<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deletar Corretor</title>
    <link rel="stylesheet" href="../../assets/css/cadastro-de-imoveis.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="header position-fixed w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="#">Home</a></li>
                <li class="botao-header"><a href="denuncias.html">Denúncias</a></li>
                <li id="barra"></li>
                <li class="botao-header"><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="navegacao d-flex align-items-center justify-content-between flex-wrap">
        <nav class="d-flex align-items-center justify-content-center gap-2">
            <select name="Cidade" id="escolherCidade" class="selecao-localidade form-select"></select>
            <div class="pesquisa d-flex align-items-center">
                <svg class="lupa" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                </svg>
                <input class="barra-pesquisa" type="text" placeholder="Pesquise Denúncias...">
            </div>
            <a class="filtrar-resultado" href="filtro-denuncias.html"> Filtrar Resultados </a>
            <button class="pesquisar-resultado"> Pesquisar Resultados </button>
        </nav>
        <nav class="d-flex align-items-center gap-2">
            <a class="adicionar-imovel align-items-center" href="imoveis.html"><svg xmlns="http://www.w3.org/2000/svg"
                    width="16" height="16" fill="currentColor" class="bi bi-plus-circle-fill" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="notificacoes"><svg xmlns="http://www.w3.org/2000/svg"
                    width="16" height="16" fill="currentColor" class="bi bi-bell-fill" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <main>
        <section class="cadastro-imovel">
            <h1>Deletar corretor</h1>
            <h4>Tem certeza que deseja deletar este corretor? Essa ação não pode ser desfeita.</h4>
            <form class="formulario-cadastro" id="form-cadastro" onsubmit="deletarCorretor(event)">
                <div class="campo-formulario">
                    <label for="cpf">CPF do corretor</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="botoes">
                    <button type="button" class="botao-cancelar" onclick="window.history.back()">Descartar
                        Cadastro</button>
                    <button type="submit" class="botao-submit">Deletar Corretor</button>
                </div>
            </form>
        </section>
    </main>
    <script src="../../assets/js/deletar-corretor.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
</body>

</html>
