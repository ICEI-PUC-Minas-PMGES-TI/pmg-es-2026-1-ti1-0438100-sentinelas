<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Corretor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/dados-corretor.css">
    
</head>
<body>  
    <header class="standard-header">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>

        <nav>
            <ul class="standard-header-nav">
                <li class="standard-header-nav-item"><a href="../denuncias/denuncias.html">Home</a></li>
                <li class="standard-header-nav-item"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="standard-header-nav-item"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="standard-header-nav-divider"></li>
                <li class="standard-header-nav-item"><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="standard-sub-nav">
        <nav class="standard-sub-nav-left">
            <select name="Cidade" id="escolherCidade" class="standard-select"></select>
            <div class="standard-search-container">
                <svg class="standard-search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                </svg>
                <input class="standard-search-input" type="text" placeholder="Pesquise...">
            </div>
            <button class="standard-search-button" id="btnSearchMain"> Pesquisar Resultados </button>
        </nav>
        <nav class="standard-sub-nav-right">
            <a class="standard-nav-action" href="../denuncias/cadastro-denuncias.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="standard-nav-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>


    <main class="d-flex flex-column align-items-center gap-5">
        <section id="edicao" class="d-flex gap-4">
            <button id="btnEditar" class="modo-visualizacao">Editar</button>
            <button id="btnSalvar" class="modo-edicao">Salvar</button>
        </section>
        <section id="perfil-corretor" class="d-flex justify-content-center gap-5 p-4">
            <div class="avatar-wrapper">
                <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="100" fill="#2d6e7e"/>
                    <circle cx="100" cy="78" r="35" fill="#e8f4f7"/>
                    <path d="M30 180 Q30 128 100 128 Q170 128 170 180" fill="#e8f4f7"/>
                </svg>
            </div>
            <div id="dados-corretor" class="d-flex flex-column gap-2 p-3">
                <h3 class="d-flex gap-2">Nome: <span id="nome-corretor" class="modo-visualizacao" ></span> <input id="nome-input" class="modo-edicao" type="text"></h3> 
                <ul class="d-flex flex-column gap-3">
                    <li class="d-flex gap-2"><strong>Especialidade:</strong> <span id="especialidade" class="modo-visualizacao" ></span> <input id="especialidade-input" class="modo-edicao" type="text"> </li>
                    <li class="d-flex gap-2"><strong>Área de Atuação:</strong> <span id="area-atuacao" class="modo-visualizacao" ></span> <input id="area-atuacao-input" class="modo-edicao" type="text"> </li>
                    <li class="d-flex gap-2"><strong>Experiência:</strong> <span id="experiencia" class="modo-visualizacao" ></span> <input id="experiencia-input" class="modo-edicao" type="text"> </li>
                </ul>
                <p class="d-flex gap-2">Contato: <span id="contato" class="modo-visualizacao" ></span> <input id="contato-input" class="modo-edicao" type="text"></p>
            </div>
        </section>
        <section id="imoveis" class="container w-100 d-flex flex-column align-items-start p-2">
            <h5 class="mb-4">Imóveis Cadastrados por este corretor:</h5>

            <div class="grade-cards d-flex flex-column gap-3 p-3 w-100" id="imoveis-regiao">
            </div>
        </section>
    </main>
    <footer class="standard-footer"></footer>
    <script src="../../assets/js/detalhes-corretor.js"></script>
</body>
</html>
