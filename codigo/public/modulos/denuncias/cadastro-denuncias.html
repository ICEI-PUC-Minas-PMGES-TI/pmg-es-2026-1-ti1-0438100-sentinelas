<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar nova denúncia</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/cadastro-denuncias.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="header w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>
        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="botao-header" id="admin-link" style="display: none;"><a href="../admin/index.html">Admin</a>
                </li>
                <li class="botao-header" id="corretor-link" style="display: none;"><a
                        href="../imoveis/cadastro-de-imoveis.html">Cadastro de imóveis</a>
                </li>
                <li id="barra"></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="standard-sub-nav">
        <nav class="standard-sub-nav-left">

            <div class="standard-search-container">

                <input class="standard-search-input pesquisa-denuncias" type="text" placeholder="Pesquise denúncias...">
            </div>
            <button class="standard-search-button botao-denuncias" id="btnSearchMain"> Pesquisar Resultados </button>
        </nav>
        <nav class="standard-sub-nav-right">
            <a class="standard-nav-action" href="../denuncias/cadastro-denuncias.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="standard-nav-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <main>
        <section class="cadastro-denuncia">
            <h1>Realizar Denúncia</h1>
            <h4>Digite as informações</h4>
            <form class="formulario-cadastro" id="form-cadastro" onsubmit="submitDenuncia(event)">
                <div class="campo-formulario">
                    <label for="local">Local da denúncia</label>
                    <div class="local">
                        <input type="text" id="local" name="local"
                            placeholder="Rua exemplo, 123 - Cidade Bonita, Estado Legal" required>
                        <button type="button" class="botao-localizacao" onclick="getLocalizacao()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-geo-alt-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" />
                            </svg>
                        </button>
                    </div>

                </div>
                <div class="campo-formulario">
                    <label for="tipo">Tipo da denúncia</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Selecione um tipo</option>
                        <option value="violencia">Violência</option>
                        <option value="descarte_irregular">Descarte Irregular</option>
                        <option value="poluicao">Poluição</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label for="descricao">Detalhes sobre a denúncia</label>
                    <textarea id="descricao" name="descricao" rows="2" required
                        placeholder="Furtaram um carro perto da casa de portão bege e ..."></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="relevancia">Relevância da denúncia</label>
                    <select id="relevancia" name="relevancia" required>
                        <option value="">Selecione a relevância</option>
                        <option value="informative">Informativa</option>
                        <option value="urgent">Urgente</option>
                        <option value="critical">Crítica</option>
                    </select>
                </div>
                <div class="botoes">
                    <button type="button" class="botao-cancelar" onclick="window.history.back()">Descartar
                        Denúncia</button>
                    <button type="submit" class="botao-submit">Enviar Denúncia</button>
                </div>
            </form>
        </section>
    </main>
    <footer class="standard-footer"></footer>
    <script src="../../assets/js/cadastro-denuncias.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
    <script src="../../assets/js/script.js"></script>
</body>

</html>
