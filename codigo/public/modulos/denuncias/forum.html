<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum de Comentários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/css/forum.css">
</head>

<body>

    <section class="secao-forum">

        <h2 class="titulo-forum">Fórum de Comentários</h2>
        <p class="subtitulo-forum">Os comentários são anônimos. Seja respeitoso.</p>

        <div class="feed-comentarios" id="feed-comentarios">
            <div class="comentario">
                <div class="comentario-topo d-flex justify-content-between align-items-center">
                    <span class="autor-anonimo">Anônimo</span>
                    <span class="comentario-hora">há 2 horas</span>
                </div>
                <p class="comentario-texto">Essa rua está horrível há meses, já caí aqui de bicicleta.</p>
            </div>
            <div class="comentario">
                <div class="comentario-topo d-flex justify-content-between align-items-center">
                    <span class="autor-anonimo">Anônimo</span>
                    <span class="comentario-hora">há 5 horas</span>
                </div>
                <p class="comentario-texto">Já liguei para a prefeitura mas não tiveram retorno até agora.</p>
            </div>
        </div>

        <div class="formulario-comentario">
            <h3 class="titulo-formulario">Deixe seu comentário</h3>
            <textarea
                id="input-comentario"
                class="campo-comentario"
                placeholder="Escreva seu comentário aqui..."
                rows="4"
                maxlength="500"
            ></textarea>
            <div class="rodape-formulario">
                <span class="contador-chars"><span id="char-count">0</span>/500</span>
                <button class="btn-enviar" id="btn-enviar">Enviar Comentário</button>
            </div>
        </div>

    </section>

    <script src="../../assets/js/forum.js"></script>

</body>

</html>
