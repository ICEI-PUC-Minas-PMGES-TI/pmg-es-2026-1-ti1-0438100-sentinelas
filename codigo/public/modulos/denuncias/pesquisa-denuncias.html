<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Denúncias - Vigilare</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/filters.css">
    <link rel="stylesheet" href="../../assets/css/denuncias.css">
</head>

<body>
    <header class="header w-100 d-flex justify-content-between align-items-center">
        <a href="#"><img src="../../assets/images/logo_without_bg.png" width="72" alt="Logo do vigilare"></a>
        <nav>
            <ul class="navegacao-header d-flex">
                <li class="botao-header"><a href="../denuncias/denuncias.html">Denúncias</a></li>
                <li class="botao-header"><a href="../imoveis/exibicao-imoveis.html">Imóveis</a></li>
                <li class="botao-header" id="admin-link" style="display: none;"><a href="../admin/index.html">Admin</a>
                </li>
                <li class="botao-header" id="corretor-link" style="display: none;"><a
                        href="../imoveis/cadastro-de-imoveis.html">Cadastro de imóveis</a>
                </li>
                <li id="barra"></li>
                <li class="botao-header"><a href="../login/login.html" id="username">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="standard-sub-nav">
        <nav class="standard-sub-nav-left">

            <div class="standard-search-container">

                <input class="standard-search-input pesquisa-denuncias" type="text" id="searchInput"
                    placeholder="Pesquise denúncias...">
            </div>
            <button class="standard-search-button botao-denuncias" id="btnSearch"> Pesquisar Resultados </button>
        </nav>
        <nav class="standard-sub-nav-right">
            <button class="standard-nav-action" id="filterToggleBtn" title="Filtros">
                <i class="bi bi-filter"></i>
            </button>

            <a class="standard-nav-action" href="../denuncias/cadastro-denuncias.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z" />
                </svg>
            </a>

            <a href="../notificacoes/notificacoes.html" class="standard-nav-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901" />
                </svg>
            </a>
        </nav>
    </div>

    <main class="main">
        <!-- Seção de Filtros (Painel Lateral) -->
        <aside id="filterPanel" class="filters">
            <div class="filtersHeader">
                <h2 class="filtersTitle">Filtros</h2>
                <button class="filtersClose" id="filterCloseBtn" title="Fechar filtros"
                    style="background: none; border: none; font-size: 1.5rem; color: #236377; cursor: pointer;">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <form id="filterForm" class="filterForm">
                <div class="filterField">
                    <label for="filterType" class="filterFieldLabel">Tipo de Denúncia</label>
                    <div class="filterFieldSelectWrap">
                        <select id="filterType" class="filterFieldInput filterFieldSelect">
                            <option value="">Todos</option>
                            <option value="theft">Furto</option>
                            <option value="robbery">Roubo</option>
                            <option value="vandalism">Vandalismo</option>
                            <option value="assault">Assalto</option>
                            <option value="harassment">Assédio</option>
                        </select>
                    </div>
                </div>
                <div class="filterField">
                    <label for="filterRelevancy" class="filterFieldLabel">Urgência</label>
                    <div class="filterFieldSelectWrap">
                        <select id="filterRelevancy" class="filterFieldInput filterFieldSelect">
                            <option value="">Todas</option>
                            <option value="urgent">Urgente</option>
                            <option value="high">Alta</option>
                            <option value="moderate">Moderada</option>
                            <option value="low">Baixa</option>
                            <option value="informative">Informativa</option>
                        </select>
                    </div>
                </div>
                <div class="filterField">
                    <label for="filterStatus" class="filterFieldLabel">Status</label>
                    <div class="filterFieldSelectWrap">
                        <select id="filterStatus" class="filterFieldInput filterFieldSelect">
                            <option value="">Todos</option>
                            <option value="open">Aberto</option>
                            <option value="closed">Fechado</option>
                        </select>
                    </div>
                </div>
                <div class="filterFormActions">
                    <button type="reset" class="filterFormBtn filterFormBtnReset">Limpar</button>
                    <button type="submit" class="filterFormBtn filterFormBtnApply">Aplicar</button>
                </div>
            </form>
        </aside>

        <section class="results">
            <div class="results__header">
                <div>
                    <h1 class="results__title">Resultados da Pesquisa</h1>
                    <span id="resultsCount" class="results__count">Encontradas 0 denúncias</span>
                </div>
                <div class="results__sort">
                    <label class="results__sort-label">Ordenar por:</label>
                    <select class="results__sort-select" id="sortSelect">
                        <option value="newest">Mais recentes</option>
                        <option value="oldest">Mais antigas</option>
                        <option value="witness">Mais testemunhas</option>
                    </select>
                </div>
            </div>

            <div id="resultsList" class="grade-cards d-grid mt-3">
                <div class="text-center py-5 w-100" style="grid-column: 1 / -1;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="standard-footer"></footer>

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/search-redirect.js"></script>
    <script src="../../assets/js/pesquisa-denuncias.js"></script>
</body>

</html>
