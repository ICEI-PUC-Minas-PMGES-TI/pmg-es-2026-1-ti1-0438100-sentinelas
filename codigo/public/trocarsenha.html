<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trocar senha</title>
    <link rel="stylesheet" href="trocarsenha.css">
</head>
<body>

    <!-- HEADER -->
    <header class="topo">
        <div class="logo">VIGILARE</div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Denúncias</a>
            <a href="#">Usuário Teste</a>
        </nav>

        <div class="acoes">
            <button class="btn">Filtrar Resultados</button>
            <button class="btn destaque">Registrar Denúncia</button>
            <span class="icone">🔔</span>
            <span class="icone">👤</span>
        </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="container">
        <div class="form-area">

            <h1>Trocar a senha</h1>
            <p>
                Confirme seu email abaixo. Se estiver correto,enviaremos um email <br>
                para recriar sua senha 
                 
                
            </p>
        <div class="campo-email">
            <label>Digite seu email</label>
            <input type="email" placeholder="usuario@gmail.com">
        </div>

            <div class="botoes">
                <button class="cancelar">Cancelar</button>
                <button class="enviar">Enviar e-mail</button>
            </div>
            

        </div>

    </main>
    <div class="barra-rodape">© 2023 VIGILARE. Todos os direitos reservados.</div>

</body>
</html>
